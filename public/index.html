<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Proxy</title>
    <!-- Optional: Add a basic stylesheet if needed -->
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #000; color: #fff; }
        #content { text-align: center; }
    </style>
</head>
<body>
    <div id="content">Loading...</div>
    <script>
        console.log('Script started');
        try {
            // Get the 'q' parameter from the URL
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            console.log('Query parameter:', query);

            if (query) {
                // Make a fetch request to the serverless function
                fetch(`/api/getGame?query=${encodeURIComponent(query)}`)
                    .then(response => {
                        console.log('Response status:', response.status);
                        if (!response.ok) {
                            throw new Error(`HTTP error! Status: ${response.status}`);
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log('Data received:', data);
                        // Assuming the API returns an 'html' field with content
                        if (data && data.html) {
                            document.getElementById('content').innerHTML = data.html;
                        } else {
                            throw new Error('Invalid response format');
                        }
                    })
                    .catch(error => {
                        console.error('Fetch error:', error);
                        document.getElementById('content').innerHTML = 'Failed to load content. Please try again later.';
                    });
            } else {
                document.getElementById('content').innerHTML = 'No query parameter provided.';
            }
        } catch (e) {
            console.error('Script execution error:', e);
            document.getElementById('content').innerHTML = 'An error occurred while loading the page.';
        }
    </script>
</body>
</html>
